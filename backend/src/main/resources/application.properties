# Server Configuration
server.port=8080

# MongoDB Configuration
# For local MongoDB:
spring.data.mongodb.uri=mongodb://localhost:27017/campus_hub

# For MongoDB Atlas, uncomment and update the following:
# spring.data.mongodb.uri=mongodb+srv://<username>:<password>@cluster0.mongodb.net/campus_hub?retryWrites=true&w=majority

# Jackson Configuration for LocalDateTime
spring.jackson.serialization.write-dates-as-timestamps=false

# Logging
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
